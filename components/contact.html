<!-- Contact Section -->
<section class="contact section" id="contact">
    <div class="container">

        <div class="section-heading">
            <h2>Get In Touch</h2>
            <div class="underline"></div>
        </div>

        <div class="contact-content">

            <!-- Contact Information -->
            <div class="contact-info">

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Email</h3>
                        <p>
                            <a href="mailto:vipin629965@gmail.com">
                                vipin629965@gmail.com
                            </a>
                        </p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Phone</h3>
                        <p>
                            <a href="tel:+916299654978">
                                +91 6299654978
                            </a>
                        </p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fab fa-linkedin"></i>
                    </div>
                    <div class="contact-details">
                        <h3>LinkedIn</h3>
                        <p>
                            <a href="https://www.linkedin.com/in/ervipin-kumar/" target="_blank">
                                linkedin.com/in/ervipin-kumar
                            </a>
                        </p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fab fa-github"></i>
                    </div>
                    <div class="contact-details">
                        <h3>GitHub</h3>
                        <p>
                            <a href="https://github.com/Vipin882005" target="_blank">
                                github.com/Vipin882005
                            </a>
                        </p>
                    </div>
                </div>

            </div>

            <!-- Contact Form -->
            <div class="contact-form">

                <form id="contactForm"
                      action="https://formspree.io/f/xbdvdbjg" method="POST">

                    <input type="hidden"
                           name="_subject"
                           value="Vipin Portfolio Contact">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text"
                               id="name"
                               name="Name"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email"
                               id="email"
                               name="Email"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text"
                               id="subject"
                               name="Subject"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message"
                                  name="Message"
                                  rows="6"
                                  required></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-primary btn-submit">Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
